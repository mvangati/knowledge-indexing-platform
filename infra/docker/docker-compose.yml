version: "3.9"

services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/knowledge.db
      - TENANT_KEYS=tenant1:key-tenant1-secret,tenant2:key-tenant2-secret
      - LOG_LEVEL=INFO
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  app_data:
